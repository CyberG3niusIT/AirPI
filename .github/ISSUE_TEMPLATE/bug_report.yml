name: Bug report
description: Report a reproducible AirPI problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Pi model, OS, Python version, model file and AirPI version.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact commands or API request.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Redact secrets before posting logs.
