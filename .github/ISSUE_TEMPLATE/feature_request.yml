name: Feature request
description: Suggest an AirPI improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What should AirPI make easier or safer?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What behavior or interface do you want?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Inference runtime
        - API compatibility
        - Raspberry Pi operations
        - Documentation
        - Other
